name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # 临时兼容 Node.js 版本警告
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Debug - Check current directory and files
        run: |
          pwd
          ls -la

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn numpy -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Debug - Run train_model.py with full error output
        run: |
          python -u train_model.py 2>&1
          echo "Script exit code: $?"
          ls -la
